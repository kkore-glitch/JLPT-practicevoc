<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="K日単">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <title>日檢自修室</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #87ceeb;
            --border-color: #4682b4;
            --correct-color: #2e8b57;
            --wrong-color: #b22222;
            --btn-bg: #1a2a3a;
            --btn-hover: #2a3a4a;
            --accent-color: #2e8b57;
            --accent-text: #ffffff;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-top: calc(env(safe-area-inset-top) + 60px);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.grammar-theme {
            --text-color: #ffb0b8;
            --border-color: #a84955;
            --btn-bg: #351820;
            --btn-hover: #4a202c;
            --accent-color: #b84555;
        }

        body.grammar-theme .section-box {
            background-color: rgba(74, 32, 44, 0.34);
        }

        body.grammar-theme .source-status {
            color: #d9a1aa;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            padding-top: calc(env(safe-area-inset-top) + 10px);
            padding-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            min-height: calc(env(safe-area-inset-top) + 40px);
        }

        h1 { margin: 0; font-size: 1.2rem; display: inline-block; line-height: 30px;}

        .header-btn-right, .header-btn-left {
            position: absolute;
            bottom: 10px;
            background: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 10;
        }
        .header-btn-left { left: max(15px, env(safe-area-inset-left)); }
        .header-btn-right { right: max(15px, env(safe-area-inset-right)); }

        main { flex: 1; padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; }

        .section-box {
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: rgba(26, 42, 58, 0.3);
        }

        .section-title { font-size: 0.9rem; margin-bottom: 8px; font-weight: bold; border-bottom: 1px dashed var(--border-color); padding-bottom: 4px;}

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 2px auto 18px;
        }
        .mode-switch-item {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 128px;
            min-height: 48px;
            border: 1px solid rgba(70, 130, 180, 0.85);
            border-radius: 999px;
            background: rgba(26, 42, 58, 0.42);
            color: #b9ddea;
            font-size: 1.08rem;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }
        .mode-switch-item input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .mode-switch-item:active { transform: translateY(1px); }
        .mode-switch-item:has(input:checked) {
            background: rgba(255, 150, 76, 0.2);
            border-color: rgba(255, 177, 94, 0.95);
            color: #ffd8aa;
            box-shadow: 0 0 0 1px rgba(255, 177, 94, 0.2), 0 0 20px rgba(255, 137, 64, 0.24);
        }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .checkbox-item {
            position: relative; display: inline-flex; align-items: center; justify-content: center;
            min-height: 38px; padding: 8px 14px; border: 1px solid rgba(70, 130, 180, 0.8);
            border-radius: 999px; background: rgba(26, 42, 58, 0.45); color: #9fd8ee;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; user-select: none;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }
        .checkbox-item input {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .checkbox-item:active { transform: translateY(1px); }
        .checkbox-item:has(input:checked) {
            background: rgba(255, 150, 76, 0.18); border-color: rgba(255, 177, 94, 0.95);
            color: #ffd8aa; box-shadow: 0 0 0 1px rgba(255, 177, 94, 0.18), 0 0 18px rgba(255, 137, 64, 0.22);
        }

        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .input-row input[type="number"] {
            width: 110px; margin-left: 10px; background: rgba(0, 0, 0, 0.35); color: var(--text-color);
            border: 1px solid rgba(70, 130, 180, 0.85); border-radius: 8px; padding: 8px 10px;
            text-align: center; font-weight: 700;
        }
        .source-status {
            margin-top: 8px; color: #9ab7c5; font-size: 0.78rem; line-height: 1.45;
        }
        .subtle-meta {
            margin-top: 8px; color: #91a9b4; font-size: 0.78rem; line-height: 1.45;
        }
        .subtle-action {
            display: inline-block; width: auto; margin-top: 10px; margin-bottom: 0; padding: 7px 10px;
            background: transparent; color: #9ab7c5; border: 1px solid rgba(154, 183, 197, 0.45);
            border-radius: 6px; font-size: 0.78rem;
        }
        .subtle-action:active { background: rgba(154, 183, 197, 0.12); }

        .btn {
            display: block; width: 100%; padding: 12px; background: var(--btn-bg); color: var(--text-color);
            border: 1px solid var(--border-color); border-radius: 8px; font-size: 1rem; margin-bottom: 10px; cursor: pointer; text-align: center;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn:active:not(:disabled) { background: var(--btn-hover); }
        .btn-accent { background-color: var(--accent-color); color: var(--accent-text); font-weight: bold; }
        .btn-half { display: inline-block; width: 48%; }

        /* Practice Area */
        #practice-area { display: flex; flex-direction: column; justify-content: center; position: relative;}
        .progress-bar { font-size: 0.9rem; text-align: center; margin-bottom: 10px; letter-spacing: 1px;}
        .timer { font-size: 2rem; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .question-box { font-size: 2rem; text-align: center; margin: 15px 0; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn {
            background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color);
            padding: 15px; border-radius: 8px; font-size: 1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s;
        }
        .option-btn.correct { background-color: var(--correct-color); color: white; border-color: white;}
        .option-btn.wrong { background-color: var(--wrong-color); color: white; border-color: white;}

        .manual-input-area { display: flex; flex-direction: column; gap: 10px; align-items: center;}
        .manual-input { width: 100%; padding: 12px; font-size: 1.2rem; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); text-align: center; }

        .hidden { display: none !important; }
        .fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Modals */
        dialog {
            background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);
            border-radius: 8px; width: 90%; max-width: 500px; padding: 15px; top: 50%; transform: translateY(-50%);
            margin: 0 auto; max-height: 80vh; overflow-y: auto; overscroll-behavior: contain;
        }
        dialog::backdrop { background: rgba(0, 0, 0, 0.8); }
        .dialog-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;}
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #333; font-size: 0.9rem;}
        
        /* Edit Form */
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; background: #000; color: var(--text-color); border: 1px solid var(--border-color); }
        
        #result-list { max-height: 40vh; overflow-y: auto; }
        .textarea-csv { width: 100%; height: 100px; background: #000; color: var(--text-color); border: 1px solid var(--border-color); margin-bottom: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <button id="btn-unfamiliar" class="header-btn-left hidden" onclick="markUnfamiliar()">我不熟</button>
        <h1>日檢自修室</h1>
        <button id="btn-open-fav" class="header-btn-right" onclick="openFavorites()">收藏清單</button>
        <button id="btn-finish-now" class="header-btn-right hidden" onclick="finishPracticeNow()">立即結算</button>
    </header>

    <!-- Main Menu -->
    <main id="main-menu" class="fade">
        <div class="mode-switch" aria-label="練習模式">
            <label class="mode-switch-item"><input type="radio" name="practice-mode" value="vocab" checked onchange="setPracticeMode('vocab')"> <span>單字</span></label>
            <label class="mode-switch-item"><input type="radio" name="practice-mode" value="grammar" onchange="setPracticeMode('grammar')"> <span>文法</span></label>
        </div>

        <div id="vocab-menu">
            <div class="section-box">
                <div class="section-title">選擇級別</div>
                <div class="checkbox-group" id="level-checks">
                    <label class="checkbox-item"><input type="checkbox" value="收藏" checked> 收藏</label>
                    <label class="checkbox-item"><input type="checkbox" value="複習" checked> 複習</label>
                    <label class="checkbox-item"><input type="checkbox" value="N3" checked> N3</label>
                    <label class="checkbox-item"><input type="checkbox" value="N2" checked> N2</label>
                    <label class="checkbox-item"><input type="checkbox" value="N1" checked> N1</label>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title">選擇題型</div>
                <div class="checkbox-group" id="type-checks">
                    <label class="checkbox-item"><input type="checkbox" value="pinyin" checked> 拼音</label>
                    <label class="checkbox-item"><input type="checkbox" value="zh_jp" checked> 中翻日</label>
                    <label class="checkbox-item"><input type="checkbox" value="jp_zh" checked> 日翻中</label>
                    <label class="checkbox-item"><input type="checkbox" value="manual" checked> 手輸</label>
                </div>
            </div>

            <div class="section-box">
                <div class="input-row">
                    <span>題目數量</span>
                    <input type="number" id="question-count" value="20" min="1" max="999">
                </div>
                <div class="checkbox-group" id="vocab-priority-checks">
                    <label class="checkbox-item"><input type="checkbox" id="weighted-vocab-mode" value="weighted"> 加強錯題與新字</label>
                </div>
                <input type="hidden" id="pool-size" value="105">
                <span id="pool-label" class="hidden">MAX</span>
                <div id="source-status" class="source-status">題庫載入中...</div>
            </div>

            <div class="section-box">
                <div class="section-title">選擇練習類別</div>
                <div class="checkbox-group" id="category-checks">
                    <label class="checkbox-item"><input type="checkbox" value="單字" checked> 單字</label>
                    <label class="checkbox-item"><input type="checkbox" value="語彙" checked> 語彙</label>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title">選擇單字詞性</div>
                <div class="checkbox-group" id="pos-checks">
                    <label class="checkbox-item"><input type="checkbox" value="名詞" checked> 名詞</label>
                    <label class="checkbox-item"><input type="checkbox" value="動詞" checked> 動詞</label>
                    <label class="checkbox-item"><input type="checkbox" value="形容詞" checked> 形容詞</label>
                    <label class="checkbox-item"><input type="checkbox" value="副詞" checked> 副詞</label>
                    <label class="checkbox-item"><input type="checkbox" value="擬聲擬態語" checked> 擬聲擬態語</label>
                </div>
            </div>

            <button class="btn" onclick="openCardManager()">字卡清單 (新增/編輯)</button>
            <button class="btn btn-accent" onclick="startPractice()">開始練習</button>
        </div>

        <div id="grammar-menu" class="hidden">
            <div class="section-box">
                <div class="section-title">文法範圍</div>
                <div class="checkbox-group" id="grammar-scope-checks">
                    <label class="checkbox-item"><input type="checkbox" id="grammar-favorites-only" value="favorites"> 收藏</label>
                    <label class="checkbox-item"><input type="checkbox" class="grammar-kind-input" value="standard" checked> 一般文法</label>
                    <label class="checkbox-item"><input type="checkbox" class="grammar-kind-input" value="split" checked> 呼應文法</label>
                </div>
            </div>

            <div class="section-box">
                <div class="input-row">
                    <span>題目數量</span>
                    <input type="number" id="grammar-question-count" value="20" min="1" max="999">
                </div>
                <div id="grammar-source-status" class="source-status">文法題庫載入中...</div>
            </div>

            <button class="btn btn-accent" id="btn-start-grammar">開始文法練習</button>
            <button class="btn" style="font-size: 0.9rem;" onclick="openFlaggedGrammarExamples()">查看注記題目</button>
        </div>
    </main>

    <!-- Practice Area -->
    <main id="practice-area" class="hidden">
        <div class="progress-bar" id="progress-bar">剩餘 0 題</div>
        <div class="timer" id="timer-display">30</div>
        
        <div class="question-box" id="question-text">題目</div>
        
        <div id="options-area" class="options-grid"></div>
        
        <div id="manual-area" class="manual-input-area hidden">
            <input type="text" id="manual-input" class="manual-input" placeholder="請輸入平假名拼音" autocomplete="off" autocorrect="off" autocapitalize="none">
            <button id="btn-manual-submit" class="btn" onclick="checkManualAnswer()">送出</button>
        </div>

        <button id="btn-next" class="btn btn-accent hidden" style="margin-top: 20px;" onclick="nextQuestion()">下一題</button>
    </main>

    <!-- Result Area -->
    <main id="result-area" class="hidden">
        <h2 style="text-align: center;">測驗結算</h2>
        <div id="score-display" style="text-align: center; font-size: 1.5rem; margin-bottom: 20px;"></div>
        
        <div class="section-box">
            <div class="section-title" id="result-list-title">重點錯誤/不熟題目 (勾選加入收藏)</div>
            <div id="result-list"></div>
        </div>
        <button class="btn" onclick="saveResultFavoritesAndReturn()">完成並返回主頁</button>
    </main>

    <!-- Favorites Modal -->
    <dialog id="favorites-modal">
        <div class="dialog-header">
            <strong id="favorites-modal-title">收藏清單</strong>
            <div>
                <button onclick="toggleAllFavs(true)" style="background:none; color:var(--text-color); border:1px solid var(--border-color);">全選</button>
                <button onclick="toggleAllFavs(false)" style="background:none; color:var(--text-color); border:1px solid var(--border-color);">取消</button>
            </div>
        </div>
        <div id="fav-list" style="margin-bottom: 15px; max-height: 50vh; overflow-y: auto;"></div>
        <button class="btn btn-accent" id="fav-browse-button" style="margin-bottom: 15px;" onclick="startFavBrowse()">瀏覽單字卡</button>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn btn-half" onclick="document.getElementById('favorites-modal').close()">取消</button>
            <button class="btn btn-half" onclick="applyFavoritesChanges()">確定變更</button>
        </div>
    </dialog>

    <!-- Browse Favorites Modal -->
    <dialog id="browse-modal">
        <div class="dialog-header">
            <strong id="browse-modal-title">收藏瀏覽 (<span id="browse-progress"></span>)</strong>
            <button onclick="document.getElementById('browse-modal').close()" style="background:none; color:var(--text-color); border:1px solid var(--border-color);">關閉</button>
        </div>
        <div id="browse-content" style="text-align: center; padding: 20px 0; min-height: 200px;">
            <!-- Content will be injected here -->
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
            <button class="btn btn-half" id="btn-browse-prev" onclick="browsePrev()">上一張</button>
            <button class="btn btn-half" id="btn-browse-next" onclick="browseNext()">下一張</button>
        </div>
    </dialog>

    <!-- Card Manager Modal -->
    <dialog id="card-manager-modal">
        <div class="dialog-header">
            <strong>字卡清單</strong>
            <button onclick="openEditForm()" style="background:var(--text-color); color:#000; border:none; padding:4px 8px; border-radius:4px;">新增字卡</button>
        </div>
        <textarea id="csv-io" class="textarea-csv" placeholder="您可以在此貼上CSV格式資料以大量匯入，或複製以備份。"></textarea>
        
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn" style="padding: 8px; font-size: 0.9rem; margin-bottom: 0;" onclick="importCSV()">匯入 CSV</button>
            <button class="btn" style="padding: 8px; font-size: 0.9rem; margin-bottom: 0; background-color: #8b0000;" onclick="resetToDefault()">載入雲端題庫</button>
        </div>

        <div id="all-cards-list" style="margin-top:10px; max-height: 40vh; overflow-y: auto;"></div>
        <button class="btn" style="margin-top:10px;" onclick="document.getElementById('card-manager-modal').close()">關閉</button>
    </dialog>

    <!-- Edit Form Modal -->
    <dialog id="edit-form-modal">
        <div class="dialog-header">
            <strong id="edit-form-title">編輯字卡</strong>
        </div>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>級別 (必填)</label><input type="text" id="edit-level" placeholder="例如: N1"></div>
        <div class="form-group"><label>日文名稱 (無漢字留空)</label><input type="text" id="edit-kanji"></div>
        <div class="form-group"><label>日文拼音 (必填)</label><input type="text" id="edit-kana"></div>
        <div class="form-group"><label>類別 (必填)</label><select id="edit-category"><option value="單字">單字</option><option value="語彙">語彙</option></select></div>
        <div class="form-group"><label>詞性 (單字適用)</label><select id="edit-pos"><option value="">語彙不分類</option><option value="名詞">名詞</option><option value="動詞">動詞</option><option value="形容詞">形容詞</option><option value="副詞">副詞</option><option value="擬聲擬態語">擬聲擬態語</option></select></div>
        <div class="form-group"><label>中文意思 (必填)</label><input type="text" id="edit-zh"></div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
            <button class="btn btn-half" onclick="document.getElementById('edit-form-modal').close(); openCardManager();">取消</button>
            <button class="btn btn-half" onclick="saveCard()">確定</button>
        </div>
    </dialog>

    <!-- Flagged Grammar Modal -->
    <dialog id="flagged-grammar-modal">
        <div class="dialog-header">
            <strong>文法注記題目</strong>
            <button onclick="document.getElementById('flagged-grammar-modal').close()" style="background:none; color:var(--text-color); border:1px solid var(--border-color);">關閉</button>
        </div>
        <div id="flagged-grammar-list" style="margin-bottom: 15px; max-height: 55vh; overflow-y: auto;"></div>
        <button class="btn" onclick="copyFlaggedGrammarExamples()">複製注記內容</button>
        <button class="btn" style="background-color: #8b0000;" onclick="clearFlaggedGrammarExamples()">清除注記</button>
    </dialog>

<script>
// --- Data & State ---
const APP_VERSION = '2026-07-13-review-stats';
const CLOUD_CSV_PATH = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwrPhdT_QiuhePdoxukHY6HtbFP7fbgBqrjwoBbtJEAqUaQEks3Nv0-iw-muew9EIpFel7Njj44SFp/pub?gid=0&single=true&output=csv';
const LOCAL_CSV_PATH = 'vocab.csv';
const CLOUD_GRAMMAR_POINTS_PATH = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2CWnpeyv2qC3kV5f-o-MC9KRukN1j25BZI7qLjCnAGEjIk-DF8MmT_dYAn_-T4KzNHoJ1EiEdHI0w/pub?gid=0&single=true&output=csv';
const CLOUD_GRAMMAR_EXAMPLES_PATH = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyMXN6JokioaowsR40FxKAze7hDhlHFhnTPWhqbXRMuFSMBfmrTtg8JGZQb4Nkn4QXoJ4ebFBltRLv/pub?gid=0&single=true&output=csv';
const LOCAL_GRAMMAR_POINTS_PATH = 'grammar_points.csv';
const LOCAL_GRAMMAR_EXAMPLES_PATH = 'grammar_examples.csv';
let defaultCSV = '';
let defaultCSVSource = '';
let defaultCSVLoadedAt = null;
let grammarCSVSource = '';
let grammarCSVLoadedAt = null;
let grammarLoadPromise = null;

let db = [];
let grammarPoints = [];

async function loadDefaultCSV() {
    if (defaultCSV) return defaultCSV;

    const sources = [
        { name: 'Google Sheet 雲端題庫', url: CLOUD_CSV_PATH },
        { name: '本機備援 vocab.csv', url: LOCAL_CSV_PATH }
    ];

    for (const source of sources) {
        try {
            const response = await fetch(source.url, { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            defaultCSV = await response.text();
            defaultCSVSource = source.name;
            defaultCSVLoadedAt = new Date();
            defaultPartOfSpeechLookup = null;
            return defaultCSV;
        } catch (error) {
            console.warn(`Failed to load ${source.name}`, error);
        }
    }

    alert('無法讀取雲端題庫或本機 vocab.csv，請確認 Google Sheet 已發布成 CSV，或 vocab.csv 與 index.html 放在同一個 GitHub 專案資料夾。');
    return '';
}

        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    }) : '尚未載入';
    const statCount = Object.keys(vocabStats).length;
    status.innerText = `題庫來源：${defaultCSVSource || '未知'}｜${db.length} 筆｜更新時間：${time}｜作答紀錄 ${statCount} 張`;
}

async function loadGrammarCSVs() {
    if (grammarPoints.length > 0 && grammarExamples.length > 0) return;

    const sources = [
        {
            name: '本機備援文法 CSV',
            pointsUrl: LOCAL_GRAMMAR_POINTS_PATH,
            examplesUrl: LOCAL_GRAMMAR_EXAMPLES_PATH
        },
        {
            name: 'Google Sheet 雲端文法題庫',
            pointsUrl: CLOUD_GRAMMAR_POINTS_PATH,
            examplesUrl: CLOUD_GRAMMAR_EXAMPLES_PATH
        }
    ];

    for (const source of sources) {
        try {
            const [pointsResponse, examplesResponse] = await Promise.all([
                fetch(source.pointsUrl, { cache: 'no-store' }),
                fetch(source.examplesUrl, { cache: 'no-store' })
            ]);
            if (!pointsResponse.ok || !examplesResponse.ok) {
                throw new Error(`HTTP ${pointsResponse.status}/${examplesResponse.status}`);
            }
            grammarPoints = parseGrammarPoints(await pointsResponse.text());
            grammarExamples = parseGrammarExamples(await examplesResponse.text());
            if (grammarPoints.length === 0 || grammarExamples.length === 0) {
                throw new Error('empty grammar data');
            }
            grammarCSVSource = source.name;
            grammarCSVLoadedAt = new Date();
            return;
        } catch (error) {
            console.warn(`Failed to load ${source.name}`, error);
        }
    }

    grammarPoints = [];
    grammarExamples = [];
    grammarCSVSource = '文法題庫讀取失敗';
    grammarCSVLoadedAt = null;
}

function parseGrammarPoints(csvText) {
    const lines = csvText.trim().split(/\r?\n/).filter(line => line.trim());
    if (lines.length === 0) return [];
    const headers = parseCSVLine(lines[0]);
    const indexOf = name => headers.findIndex(header => header === name);

    return lines.slice(1).map(line => {
        const parts = parseCSVLine(line);
        return {
            id: parts[indexOf('id')] || '',
            level: parts[indexOf('級別')] || '',
            category: parts[indexOf('分類')] || '',
            pattern: parts[indexOf('文法')] || '',
            zh: parts[indexOf('中文')] || '',
            connection: parts[indexOf('接續')] || '',
            note: parts[indexOf('重點')] || '',
            confusions: (parts[indexOf('混淆文法')] || '').split('|').map(value => value.trim()).filter(Boolean)
        };
    }).filter(point => point.id && point.pattern && point.zh);
}

function parseGrammarExamples(csvText) {
    const lines = csvText.trim().split(/\r?\n/).filter(line => line.trim());
    if (lines.length === 0) return [];
    const headers = parseCSVLine(lines[0]);
    const indexOf = name => headers.findIndex(header => header === name);
    const idIndex = headers.findIndex(header => ['example_id', 'id', '例句ID'].includes(header));

    return lines.slice(1).map((line, index) => {
        const parts = parseCSVLine(line);
        const example = {
            id: parts[idIndex] || '',
            grammarId: parts[indexOf('grammar_id')] || '',
            sentence: parts[indexOf('例句')] || '',
            blankQuestion: parts[indexOf('空格題目')] || '',
            answer: parts[indexOf('正解')] || '',
            zh: parts[indexOf('中文翻譯')] || ''
        };
        example.id = example.id || buildGrammarExampleKey(example);
        return example;
    }).filter(example => example.grammarId && example.sentence && example.answer);
}

function normalizePartOfSpeech(value) {
    const map = {
        '名詞': '名詞', 'noun': '名詞', 'n': '名詞',
        '動詞': '動詞', 'verb': '動詞', 'v': '動詞',
        '形容詞': '形容詞', 'い形容詞': '形容詞', 'な形容詞': '形容詞', 'adjective': '形容詞', 'adj': '形容詞',
        '副詞': '副詞', 'adverb': '副詞', 'adv': '副詞',
        '擬聲擬態語': '擬聲擬態語', '擬聲體態語': '擬聲擬態語', 'onomatopoeia': '擬聲擬態語'
    };
    return map[String(value || '').trim().toLowerCase()] || '';
}

function inferPartOfSpeech(card) {
    if (card.category === '語彙') return '';
    const lookup = getDefaultPartOfSpeechLookup();
    const exactKey = buildPartOfSpeechKey(card);
    const looseKey = `${card.kana || ''}|${card.zh || ''}`;
    return lookup.get(exactKey) || lookup.get(looseKey) || '名詞';
}

function buildPartOfSpeechKey(card) {
    return `${card.level || ''}|${card.kanji || ''}|${card.kana || ''}|${card.category || ''}|${card.zh || ''}`;
}

function getDefaultPartOfSpeechLookup() {
    if (defaultPartOfSpeechLookup) return defaultPartOfSpeechLookup;
    defaultPartOfSpeechLookup = new Map();
    if (!defaultCSV) return defaultPartOfSpeechLookup;
    const lines = defaultCSV.trim().split(/\r?\n/).filter(line => line.trim());
    const headers = parseCSVLine(lines[0]);
    const posIndex = headers.findIndex(h => h === '詞性' || h === 'partOfSpeech' || h === 'pos');
    for (let i = 1; i < lines.length; i++) {
        const parts = parseCSVLine(lines[i]);
        const partOfSpeech = normalizePartOfSpeech(parts[posIndex]);
        if (!partOfSpeech) continue;
        const card = { level: parts[0], kanji: parts[1] || '', kana: parts[2], category: parts[3], zh: parts[4] };
        defaultPartOfSpeechLookup.set(buildPartOfSpeechKey(card), partOfSpeech);
        defaultPartOfSpeechLookup.set(`${card.kana}|${card.zh}`, partOfSpeech);
    }
    return defaultPartOfSpeechLookup;
}

function normalizeCard(card) {
    const normalized = { ...card };
    normalized.partOfSpeech = normalized.category === '語彙'
        ? ''
        : normalizePartOfSpeech(card.partOfSpeech || card.pos || card.詞性) || inferPartOfSpeech(card);
    normalized.key = buildCardKey(normalized);
    return normalized;
}

function formatCardMeta(card) {
    return card.category === '語彙' ? card.category : `${card.category} / ${card.partOfSpeech || '未分類'}`;
}

function buildCardKey(card) {
    return [
        'card-v2',
        card.level,
        card.category,
        card.partOfSpeech,
        card.kanji,
        card.kana,
        card.zh
    ].map(value => String(value || '').trim()).join('|');
}

function getCardKey(card) {
    if (!card.key) card.key = buildCardKey(card);
    return card.key;
}

function buildGrammarExampleKey(example) {
    return [
        'grammar-example-v1',
        example.grammarId,
        example.sentence,
        example.answer
    ].map(value => String(value || '').trim()).join('|');
}

function parseCSVLine(line) {
    const values = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];
        if (char === '"' && inQuotes && next === '"') {
            current += '"';
            i++;
        } else if (char === '"') {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            values.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    values.push(current.trim());
    return values;
}

function parseCSV(csvText, replace = false) {
    const lines = csvText.trim().split(/\r?\n/).filter(line => line.trim());
    if (lines.length === 0) return;
    let newDb = replace ? [] : db;
    let maxId = newDb.length > 0 ? Math.max(...newDb.map(c => c.id)) : 0;
    
    const headers = parseCSVLine(lines[0]);
    const hasHeader = headers.includes('級別');
    const startIndex = hasHeader ? 1 : 0;
    const posIndex = hasHeader ? headers.findIndex(h => h === '詞性' || h === 'partOfSpeech' || h === 'pos') : -1;
    
    for (let i = startIndex; i < lines.length; i++) {
        let parts = parseCSVLine(lines[i]);
        if (parts.length >= 5) {
            newDb.push(normalizeCard({
                id: ++maxId,
                level: parts[0],
                kanji: parts[1] || '',
                kana: parts[2],
                category: parts[3],
                partOfSpeech: posIndex >= 0 ? parts[posIndex] : parts[5],
                zh: parts[4]
            }));
        }
    }
    db = newDb;
    saveDB();
    updateSourceStatus();
}

}

function loadStoredObject(key) {
    try {
        const value = JSON.parse(localStorage.getItem(key) || '{}');
        return value && typeof value === 'object' && !Array.isArray(value) ? value : {};
    } catch (error) {
        console.warn(`Failed to load ${key}`, error);
        return {};
    }
}

function migrateFavoriteStorage() {
    let changed = false;
    const migrated = new Set();
    favIds.forEach(value => {
        const matchingCard = db.find(card => String(card.id) === String(value));
        if (matchingCard) {
            migrated.add(getCardKey(matchingCard));
            changed = true;
        } else if (typeof value === 'string' && value.startsWith('card-v2|')) {
            migrated.add(value);
        }
    });
    if (changed || migrated.size !== favIds.size) {
        favIds = migrated;
        saveFavs();
    }
}

function isCardFavorite(card) {
    return favIds.has(getCardKey(card));
}

function saveVocabStats() {
    localStorage.setItem('jp_vocab_stats', JSON.stringify(vocabStats));
}

function pruneVocabStats() {
    const keys = new Set(db.map(getCardKey));
    let changed = false;
    Object.keys(vocabStats).forEach(key => {
        if (!keys.has(key)) {
            delete vocabStats[key];
            changed = true;
        }
    });
    if (changed) saveVocabStats();
}

function getCardStats(card) {
    const key = getCardKey(card);
    const stats = vocabStats[key] || { seen: 0, correct: 0, wrong: 0, lastSeen: 0 };
    stats.seen = Number(stats.seen) || 0;
    stats.correct = Number(stats.correct) || 0;
    stats.wrong = Number(stats.wrong) || 0;
    stats.lastSeen = Number(stats.lastSeen) || 0;
    return stats;
}

function recordVocabAnswer(card, isCorrect) {
    const key = getCardKey(card);
    const stats = getCardStats(card);
    stats.seen += 1;
    if (isCorrect) {
        stats.correct += 1;
    } else {
        stats.wrong += 1;
    }
    stats.lastSeen = Date.now();
    vocabStats[key] = stats;
    saveVocabStats();
    updateSourceStatus();
}

function formatVocabStats(card) {
    const stats = getCardStats(card);
    if (!stats.seen) return '作答紀錄：尚未作答';
    const rate = Math.round((stats.correct / stats.seen) * 100);
    return `作答紀錄：正解率 ${rate}%｜答對 ${stats.correct}｜錯 ${stats.wrong}`;
}

function openEditForm(id = null) {
    document.getElementById('card-manager-modal').close();
    const form = document.getElementById('edit-form-modal');
    if (id) {
        document.getElementById('edit-form-title').innerText = '編輯字卡';
        const card = db.find(c => c.id === id);
        document.getElementById('edit-id').value = card.id;
        document.getElementById('edit-level').value = card.level;
        document.getElementById('edit-kanji').value = card.kanji;
        document.getElementById('edit-kana').value = card.kana;
        document.getElementById('edit-category').value = card.category;
        document.getElementById('edit-pos').value = card.category === '語彙' ? '' : card.partOfSpeech || inferPartOfSpeech(card);
        document.getElementById('edit-zh').value = card.zh;
    } else {
        document.getElementById('edit-form-title').innerText = '新增字卡';
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-level').value = 'N1';
        document.getElementById('edit-kanji').value = '';
        document.getElementById('edit-kana').value = '';
        document.getElementById('edit-category').value = '單字';
        document.getElementById('edit-pos').value = '名詞';
        document.getElementById('edit-zh').value = '';
    }
    updateEditPosState();
    form.showModal();
}

function saveCard() {
    const id = document.getElementById('edit-id').value;
    const cardData = {
        level: document.getElementById('edit-level').value.trim(),
        kanji: document.getElementById('edit-kanji').value.trim(),
        kana: document.getElementById('edit-kana').value.trim(),
        category: document.getElementById('edit-category').value,
        partOfSpeech: document.getElementById('edit-category').value === '語彙' ? '' : document.getElementById('edit-pos').value,
        zh: document.getElementById('edit-zh').value.trim()
    };
    if (!cardData.level || !cardData.kana || !cardData.category || !cardData.zh) {
        alert('必填欄位不可空白'); return;
    }

    if (id) {
        let index = db.findIndex(c => c.id == id);
        if(index > -1) {
            db[index] = { ...db[index], ...cardData };
        }
    } else {
        cardData.id = db.length > 0 ? Math.max(...db.map(c => c.id)) + 1 : 1;
        db.push(cardData);
    }
    saveDB();
    document.getElementById('edit-form-modal').close();
    openCardManager();
}

function updateEditPosState() {
    const category = document.getElementById('edit-category').value;
    const posSelect = document.getElementById('edit-pos');
    const isPhrase = category === '語彙';
    posSelect.disabled = isPhrase;
    if (isPhrase) {
        posSelect.value = '';
    } else if (!posSelect.value) {
        posSelect.value = '名詞';
    }
}

function applyFavoritesChanges() {

    if (activePracticeMode === 'grammar') {
        checkboxes.forEach(cb => {
            if (!cb.checked) grammarFavIds.delete(cb.value);
        });

        saveFavs();

    document.getElementById('favorites-modal').close();

function renderBrowseCard() {

    const card = browseList[browseIndex];
    document.getElementById('browse-modal-title').innerHTML = '收藏瀏覽 (<span id="browse-progress"></span>)';
    document.getElementById('browse-progress').innerText = `${browseIndex + 1} / ${browseList.length}`;

function buildVocabSequence(pool, count, weightedMode) {
    const candidates = [...pool];
    const sequence = [];

    while (sequence.length < count && candidates.length > 0) {
        const index = weightedMode ? pickWeightedCardIndex(candidates) : Math.floor(Math.random() * candidates.length);
        sequence.push(candidates.splice(index, 1)[0]);
    }

    return sequence;
}

function pickWeightedCardIndex(cards) {
    const weights = cards.map(getVocabSelectionWeight);
    const total = weights.reduce((sum, weight) => sum + weight, 0);
    let target = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
        target -= weights[i];
        if (target <= 0) return i;
    }
    return cards.length - 1;
}

function getVocabSelectionWeight(card) {
    const stats = getCardStats(card);
    if (!stats.seen) return 6;

    const wrongRate = stats.wrong / stats.seen;
    const correctRate = stats.correct / stats.seen;
    const lowSeenBonus = Math.max(0, 3 - stats.seen) * 0.8;
    let weight = 1 + wrongRate * 5 + lowSeenBonus;

    if (stats.seen >= 5 && correctRate >= 0.85) {
        weight *= 0.35;
    } else if (stats.seen >= 3 && correctRate >= 0.7) {
        weight *= 0.65;
    }

    return Math.max(0.25, weight);
}

function getDistractors(correctCard, pool, count, logicType) {
    let distractors = pool.filter(c => {
        if (c.id === correctCard.id || c.category !== correctCard.category) return false;
        if (correctCard.category === '語彙') return true;
        return c.partOfSpeech === correctCard.partOfSpeech;
    });
    if (distractors.length < count) {
        const fallback = pool.filter(c => c.id !== correctCard.id && c.category === correctCard.category && !distractors.some(d => d.id === c.id));
        distractors.push(...fallback);
    }
    
    if (logicType === 'pinyin') {
        let similar = distractors.filter(c => c.kana.length === correctCard.kana.length);
        if (similar.length >= count) {
            distractors = similar;
        }
    }
    
    shuffleArray(distractors);
    return distractors.slice(0, count);
}

const DAKUTEN_GROUPS = [
    ['か', 'が'], ['き', 'ぎ'], ['く', 'ぐ'], ['け', 'げ'], ['こ', 'ご'],
    ['さ', 'ざ'], ['し', 'じ'], ['す', 'ず'], ['せ', 'ぜ'], ['そ', 'ぞ'],
    ['た', 'だ'], ['ち', 'ぢ'], ['つ', 'づ'], ['て', 'で'], ['と', 'ど'],
    ['は', 'ば', 'ぱ'], ['ひ', 'び', 'ぴ'], ['ふ', 'ぶ', 'ぷ'], ['へ', 'べ', 'ぺ'], ['ほ', 'ぼ', 'ぽ']
];

function getDakutenVariants(kana, limit = 3) {
    const chars = [...kana];
    const optionsByChar = chars.map(char => {
        const group = DAKUTEN_GROUPS.find(g => g.includes(char));
        return group ? group : [char];
    });
    const variantSpace = optionsByChar.reduce((total, options) => total * options.length, 1);
    if (variantSpace === 1 || variantSpace > 128) return [];

    const variants = [];
    function build(index, current) {
        if (index === optionsByChar.length) {
            const variant = current.join('');
            if (variant !== kana) {
                const changedCount = [...variant].filter((char, i) => char !== chars[i]).length;
                variants.push({ value: variant, changedCount });
            }
            return;
        }
        optionsByChar[index].forEach(char => {
            current.push(char);
            build(index + 1, current);
            current.pop();
        });
    }

    build(0, []);
    const unique = [];
    variants.forEach(variant => {
        if (!unique.some(item => item.value === variant.value)) unique.push(variant);
    });

    const singleChange = unique.filter(item => item.changedCount === 1).map(item => item.value);
    const multiChange = unique.filter(item => item.changedCount > 1).map(item => item.value);
    shuffleArray(singleChange);
    shuffleArray(multiChange);

    if (singleChange.length > 0 && multiChange.length > 0 && limit > 1) {
        const singleCount = Math.min(singleChange.length, limit - 1);
        return [...singleChange.slice(0, singleCount), ...multiChange.slice(0, limit - singleCount)];
    }

    return [...singleChange, ...multiChange].slice(0, limit);
}

function getGrammarPointMap() {
    return new Map(grammarPoints.map(point => [point.id, point]));
}

function getGrammarQuestionKind(point, example) {
    return isSplitGrammarQuestion(point, example) ? 'split' : 'standard';
}

function buildGrammarQuestion(point, example, pool) {
    const distractors = getGrammarDistractors(point, pool, 3, example);
    const options = [
        { label: example.answer, point, isCorrect: true },
        ...distractors.map(distractor => ({
            label: formatGrammarOptionLabel(distractor, example),
            point: distractor,
            isCorrect: false
        }))
    ];
    shuffleArray(options);
    return { mode: 'grammar', type: 'cloze', point, example, options };
}

function getGrammarDistractors(correctPoint, pool, count, example = null) {
    const selected = [];
    const correctLabel = String(example && example.answer || cleanGrammarPattern(correctPoint.pattern));
    const addPoint = point => {
        if (!point || point.id === correctPoint.id || selected.some(item => item.id === point.id)) return;
        if (!matchesGrammarOptionShape(correctPoint, point, example)) return;
        const optionLabel = formatGrammarOptionLabel(point, example);
        if (!optionLabel || optionLabel === correctLabel || selected.some(item => formatGrammarOptionLabel(item, example) === optionLabel)) return;
        if (isPlausibleAlternativeForExample(correctPoint, point, example)) return;
        selected.push(point);
    };

    correctPoint.confusions.forEach(pattern => {
        addPoint(grammarPoints.find(point => point.pattern === pattern));
    });

    const sameCategory = pool.filter(point => point.category === correctPoint.category);
    shuffleArray(sameCategory);
    sameCategory.forEach(addPoint);

    const fallback = grammarPoints.filter(point => !selected.some(selectedPoint => selectedPoint.id === point.id));
    shuffleArray(fallback);
    fallback.forEach(addPoint);

    return selected.slice(0, count);
}

function isPlausibleAlternativeForExample(correctPoint, candidatePoint, example) {
    if (!example) return false;
    const pairKey = [correctPoint.pattern, candidatePoint.pattern].sort().join('|');
    const answer = example.answer;
    const sentence = example.sentence;

    const sameMeaningSameSlot = new Set([
        ...buildAmbiguousPairs(['〜なり', '〜が早いか', '〜や否や']),
        ...buildAmbiguousPairs(['〜からには', '〜以上は']),
        ...buildAmbiguousPairs(['〜にはあたらない', '〜までもない', '〜ほどのことではない']),
        ...buildAmbiguousPairs(['〜たところで', '〜としたところで', '〜にしたところで']),
        ...buildAmbiguousPairs(['〜が最後', '〜たら最後']),
        ...buildAmbiguousPairs(['〜かたがた', '〜がてら', '〜を兼ねて']),
        ...buildAmbiguousPairs(['〜に先立って', '〜に先駆けて', '〜を前に']),
        ...buildAmbiguousPairs(['〜ものとして', '〜ものとする']),
        ...buildAmbiguousPairs(['〜といい〜といい', '〜といわず〜といわず']),
        ...buildAmbiguousPairs(['〜だに', '〜すら', '〜はおろか']),
        ...buildAmbiguousPairs(['〜ずとも', '〜ことなしに', '〜なしに']),
        ...buildAmbiguousPairs(['〜いかん', '〜にかかっている']),
        ...buildAmbiguousPairs(['〜ばそれまでだ', '〜たら最後', '〜が最後', '〜ようものなら']),
        ...buildAmbiguousPairs(['〜とあっては', '〜とあれば', '〜からには', '〜以上は']),
        ...buildAmbiguousPairs(['〜ながらも', '〜ものの', '〜とはいえ', '〜にもかかわらず']),
        ...buildAmbiguousPairs(['〜あげく', '〜末に', '〜果てに']),
        ...buildAmbiguousPairs(['〜みたいなところがある', '〜きらいがある', '〜ふしがある']),
        ...buildAmbiguousPairs(['〜やら〜やら', '〜だの〜だの', '〜たり〜たり', '〜とか〜とか']),
        ...buildAmbiguousPairs(['〜なり〜なり', '〜とか〜とか', '〜にしても〜にしても']),
        ...buildAmbiguousPairs(['〜だろうか〜だろうか', '〜か〜か']),
        ...buildAmbiguousPairs(['〜というか〜というか', '〜といおうか', '〜とでもいうか']),
        ...buildAmbiguousPairs(['〜にしても〜にしても', '〜といい〜といい', '〜といわず〜といわず'])
    ]);
    if (sameMeaningSameSlot.has(pairKey)) return true;
    if (hasSameGrammarMeaning(correctPoint, candidatePoint) && hasComparableConnection(correctPoint, candidatePoint)) return true;

    if (['〜からには', '〜以上は', '〜うえは', '〜とあれば'].includes(correctPoint.pattern)
        && ['〜からには', '〜以上は', '〜うえは', '〜とあれば'].includes(candidatePoint.pattern)
        && (correctPoint.pattern === '〜とあれば' || candidatePoint.pattern === '〜とあれば')) {
        return sentence.includes('必要とあれば') || sentence.includes('ためとあれば') || sentence.includes('関わるとあれば') || sentence.includes('頼まれたとあれば');
    }

    if ((correctPoint.pattern === '〜うえは' || candidatePoint.pattern === '〜うえは') && ['〜からには', '〜以上は'].includes(correctPoint.pattern === '〜うえは' ? candidatePoint.pattern : correctPoint.pattern)) {
        return /決めた|引き受けた|選ばれた|始めた|約束した/.test(sentence);
    }

    if (['〜なくしては', '〜なしに', '〜ことなしに'].includes(correctPoint.pattern) && ['〜なくしては', '〜なしに', '〜ことなしに'].includes(candidatePoint.pattern)) {
        return /ない|できない|得られない|難しい|ならない/.test(sentence);
    }

    if (['〜かたがた', '〜がてら'].includes(correctPoint.pattern) && ['〜かたがた', '〜がてら'].includes(candidatePoint.pattern)) {
        return /挨拶|報告|お礼|散歩|買い物|休憩|見学/.test(sentence);
    }

    if (['〜に即して', '〜に則って', '〜を踏まえて'].includes(correctPoint.pattern) && ['〜に即して', '〜に則って', '〜を踏まえて'].includes(candidatePoint.pattern)) {
        return /法律|規則|方針|基準|結果|意見|現状|実態/.test(sentence);
    }

    if (answer.includes('ようが') && candidatePoint.pattern === '〜ようが〜まいが') return true;
    if (answer.includes('うが') && candidatePoint.pattern === '〜ようが') return true;

    return false;
}

function buildAmbiguousPairs(patterns) {
    const pairs = [];
    for (let i = 0; i < patterns.length; i++) {
        for (let j = i + 1; j < patterns.length; j++) {
            pairs.push([patterns[i], patterns[j]].sort().join('|'));
        }
    }
    return pairs;
}

function normalizeGrammarMeaning(text) {
    return String(text || '')
        .replace(/[.。…；;，,、\s]/g, '')
        .replace(/\.\.\./g, '')
        .trim();
}

function hasSameGrammarMeaning(pointA, pointB) {
    const meaningA = normalizeGrammarMeaning(pointA.zh);
    const meaningB = normalizeGrammarMeaning(pointB.zh);
    return meaningA && meaningA === meaningB;
}

function normalizeConnection(text) {
    return String(text || '').replace(/\s/g, '');
}

function hasComparableConnection(pointA, pointB) {
    const connectionA = normalizeConnection(pointA.connection);
    const connectionB = normalizeConnection(pointB.connection);
    if (!connectionA || !connectionB) return false;
    if (connectionA === connectionB) return true;
    const markers = ['普通形', 'V辞書形', 'Vた形', 'Vます形', 'Vない形', 'N', 'いA', 'なA'];
    return markers.some(marker => connectionA.includes(marker) && connectionB.includes(marker));
}

function cleanGrammarPattern(pattern) {
    return String(pattern || '').replace(/^〜/, '');
}

const SPLIT_OPTION_PATTERNS = new Map([
    ['〜ようが〜まいが', 'ようが／まいが'],
    ['〜であれ', 'であれ／であれ'],
    ['〜といい〜といい', 'といい／といい'],
    ['〜つ〜つ', 'つ／つ'],
    ['〜といわず〜といわず', 'といわず／といわず'],
    ['〜やら〜やら', 'やら／やら'],
    ['〜なり〜なり', 'なり／なり'],
    ['〜だろうか〜だろうか', 'だろうか／だろうか'],
    ['〜だの〜だの', 'だの／だの'],
    ['〜たり〜たり', 'たり／たり'],
    ['〜というか〜というか', 'というか／というか'],
    ['〜とか〜とか', 'とか／とか'],
    ['〜にしても〜にしても', 'にしても／にしても']
]);

function getGrammarBlankCount(example) {
    return (example && example.blankQuestion.match(/____/g) || []).length;
}

function hasSplitGrammarAnswer(example) {
    return String(example && example.answer || '').includes('／');
}

function isSplitOptionPoint(point, example = null) {
    if (point.pattern === '〜であれ') return hasSplitGrammarAnswer(example);
    return SPLIT_OPTION_PATTERNS.has(point.pattern);
}

function isSplitGrammarQuestion(point, example) {
    return hasSplitGrammarAnswer(example) || isSplitOptionPoint(point, example);
}

function matchesGrammarOptionShape(correctPoint, candidatePoint, example) {
    const isSplitQuestion = isSplitGrammarQuestion(correctPoint, example);
    return isSplitQuestion === isSplitOptionPoint(candidatePoint, example);
}

function formatGrammarOptionLabel(point, example) {
    if (hasSplitGrammarAnswer(example) && SPLIT_OPTION_PATTERNS.has(point.pattern)) {
        return SPLIT_OPTION_PATTERNS.get(point.pattern);
    }
    return cleanGrammarPattern(point.pattern);
}

function renderGrammarQuestion() {
    if (currentQIndex >= practiceQueue.length) {
        endPractice();
        return;
    }

    const qData = practiceQueue[currentQIndex];
    currentQuestionData = qData;
    currentQuestionSettled = false;

    document.getElementById('options-area').innerHTML = '';
    document.getElementById('manual-area').classList.add('hidden');
    document.getElementById('options-area').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('progress-bar').innerText = `剩餘 ${practiceQueue.length - currentQIndex} 題`;
    updateUnfamiliarButtonState();

    const pArea = document.getElementById('practice-area');
    pArea.classList.remove('fade');
    void pArea.offsetWidth;
    pArea.classList.add('fade');

    const questionText = `
        <div style="font-size: 1.35rem; line-height: 1.55;">${escapeHtml(qData.example.blankQuestion)}</div>
    `;
    document.getElementById('question-text').innerHTML = questionText;

    qData.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = option.label;
        btn.onclick = () => handleGrammarChoice(btn, option);
        document.getElementById('options-area').appendChild(btn);
    });

    startTimer();
}

function handleGrammarChoice(btn, option) {
    clearInterval(timerInt);
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(button => button.disabled = true);

    if (option.isCorrect) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        mistakes.add(currentQuestionData.example ? currentQuestionData.example.id : currentQuestionData.point.id);
        btns.forEach((button, index) => {
            if (currentQuestionData.options[index] && currentQuestionData.options[index].isCorrect) {
                button.classList.add('correct');
            }
        });
    }
    markQuestionSettled();
    showGrammarAnswerDetails(option.point);
}

function showGrammarAnswerDetails(selectedPoint = null) {
    const qData = currentQuestionData;
    let displayHtml = `
        <div style="font-size: 1.35rem; color: #fff;">${escapeHtml(qData.point.pattern)}</div>
        <div style="font-size: 1rem; color: #ffd8aa; margin-top: 6px;">${escapeHtml(qData.point.zh)}</div>
        <div style="font-size: 0.85rem; color: #9ab7c5; margin-top: 6px;">${escapeHtml(qData.point.connection)}</div>
        <div style="font-size: 0.9rem; color: #b8d8e8; margin-top: 8px; line-height: 1.45;">${escapeHtml(qData.point.note)}</div>
    `;

    if (selectedPoint && selectedPoint.id !== qData.point.id) {
        displayHtml += `<div style="font-size: 0.9rem; color: #f5a3a3; margin-top: 8px; line-height: 1.45;">你選的是：${escapeHtml(selectedPoint.pattern)}｜${escapeHtml(selectedPoint.zh)}<br>${escapeHtml(selectedPoint.note)}</div>`;
    }
    if (qData.example) {
        displayHtml += `
            <div style="font-size: 1rem; color: #87ceeb; margin-top: 12px; line-height: 1.5;">${escapeHtml(qData.example.sentence)}</div>
            <div style="font-size: 0.95rem; color: #aaa; margin-top: 5px; line-height: 1.45;">${escapeHtml(qData.example.zh)}</div>
            <button class="subtle-action" onclick="toggleCurrentGrammarExampleFlag()">${isGrammarExampleFlagged(qData.example) ? '已注記此例句' : '注記此例句'}</button>
        `;
    }

    document.getElementById('question-text').innerHTML = displayHtml;
    document.getElementById('btn-next').classList.remove('hidden');
}

function isGrammarExampleFlagged(example) {
    return Boolean(example && flaggedGrammarExamples[example.id]);
}

function saveFlaggedGrammarExamples() {
    localStorage.setItem('jp_flagged_grammar_examples', JSON.stringify(flaggedGrammarExamples));
}

function toggleCurrentGrammarExampleFlag() {
    if (!currentQuestionData || !currentQuestionData.example) return;
    const { point, example } = currentQuestionData;
    if (flaggedGrammarExamples[example.id]) {
        delete flaggedGrammarExamples[example.id];
    } else {
        flaggedGrammarExamples[example.id] = {
            id: example.id,
            grammarId: example.grammarId,
            pattern: point.pattern,
            category: point.category,
            sentence: example.sentence,
            blankQuestion: example.blankQuestion,
            answer: example.answer,
            zh: example.zh,
            createdAt: new Date().toISOString()
        };
    }
    saveFlaggedGrammarExamples();
    showGrammarAnswerDetails();
}

function openFlaggedGrammarExamples() {
    const list = document.getElementById('flagged-grammar-list');
    const entries = Object.values(flaggedGrammarExamples);
    if (entries.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding: 20px;">尚無注記題目</div>';
    } else {
        list.innerHTML = entries.map(entry => `
            <div class="list-item" style="align-items:flex-start; gap:10px;">
                <span>
                    [${escapeHtml(entry.grammarId)}] ${escapeHtml(entry.pattern || '')}
                    <br><span style="color:#aaa;">${escapeHtml(entry.sentence || '')}</span>
                    <br><span class="subtle-meta">正解：${escapeHtml(entry.answer || '')}｜${escapeHtml(entry.zh || '')}</span>
                </span>
                <button onclick="removeFlaggedGrammarExample('${encodeURIComponent(entry.id)}')" style="background:none; color:var(--text-color); border:1px solid var(--border-color);">移除</button>
            </div>
        `).join('');
    }
    document.getElementById('flagged-grammar-modal').showModal();
}

function removeFlaggedGrammarExample(id) {
    delete flaggedGrammarExamples[decodeURIComponent(id)];
    saveFlaggedGrammarExamples();
    openFlaggedGrammarExamples();
}

function formatFlaggedGrammarExamples() {
    const entries = Object.values(flaggedGrammarExamples);
    if (entries.length === 0) return '';
    return entries.map((entry, index) => [
        `${index + 1}. ${entry.grammarId} ${entry.pattern || ''}`,
        `例句：${entry.sentence || ''}`,
        `題目：${entry.blankQuestion || ''}`,
        `正解：${entry.answer || ''}`,
        `中文：${entry.zh || ''}`
    ].join('\n')).join('\n\n');
}

async function copyFlaggedGrammarExamples() {
    const text = formatFlaggedGrammarExamples();
    if (!text) {
        alert('尚無注記題目');
        return;
    }
    try {
        await navigator.clipboard.writeText(text);
        alert('已複製注記內容');
    } catch (error) {
        window.prompt('請複製以下內容', text);
    }
}

function clearFlaggedGrammarExamples() {
    if (!confirm('確定清除所有文法注記嗎？')) return;
    flaggedGrammarExamples = {};
    saveFlaggedGrammarExamples();
    openFlaggedGrammarExamples();
}

function startTimer() {
    clearInterval(timerInt);
    timeLeft = activePracticeMode === 'grammar' ? 60 : 30;
    document.getElementById('timer-display').innerText = timeLeft;
    timerInt = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInt);
            handleTimeout();
        }
    }, 1000);
}

function markQuestionSettled() {
    if (currentQuestionSettled) return;
    currentQuestionSettled = true;
    completedQuestionCount++;
}

function finishPracticeNow() {
    clearInterval(timerInt);
    const fallbackTotal = score + mistakes.size;
    resultTotalOverride = Math.max(completedQuestionCount, fallbackTotal);
    endPractice();
}

function getResultTotal() {
    return resultTotalOverride === null ? practiceQueue.length : resultTotalOverride;
}

function formatScoreResult(total) {
    if (total <= 0) return `正解率: --% (${score}/0)`;
    const cappedScore = Math.min(score, total);
    const rate = Math.round((cappedScore / total) * 100);
    return `正解率: ${rate}% (${cappedScore}/${total})`;
}

function showAnswerDetails() {
    let card = currentQuestionData.card;
    let displayHtml = "";
    if (card.kanji) {
        displayHtml += `<div style="font-size: 1.8rem; color: #fff;">${card.kanji}</div>`;
    }
    displayHtml += `<div style="font-size: 1.2rem; color: #aaa; margin-top: 5px;">${card.kana}</div>`;
    displayHtml += `<div style="font-size: 0.95rem; color: #aaa; margin-top: 5px;">${formatCardMeta(card)}</div>`;
    displayHtml += `<div style="font-size: 1.2rem; color: #87ceeb; margin-top: 5px;">${card.zh}</div>`;
    displayHtml += `<div class="subtle-meta">${escapeHtml(formatVocabStats(card))}</div>`;
    
    document.getElementById('question-text').innerHTML = displayHtml;
    document.getElementById('btn-next').classList.remove('hidden');
}

function handleChoice(btn, isCorrect, correctStr) {
    clearInterval(timerInt);
    let btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    if (isCorrect) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        mistakes.add(getCardKey(currentQuestionData.card));
        btns.forEach(b => {
            if (b.innerText === correctStr) b.classList.add('correct');
        });
    }
    recordVocabAnswer(currentQuestionData.card, isCorrect && !currentQuestionData.forceReview);
    markQuestionSettled();
    showAnswerDetails();
}

function checkManualAnswer() {
    clearInterval(timerInt);
    let manualInput = document.getElementById('manual-input');
    let val = manualInput.value.trim();
    let isCorrect = val === currentQuestionData.card.kana;
    
    manualInput.disabled = true;
    document.getElementById('btn-manual-submit').disabled = true;

    if (isCorrect) {
        manualInput.style.backgroundColor = varColor('--correct-color');
        score++;
    } else {
        manualInput.style.backgroundColor = varColor('--wrong-color');
        mistakes.add(getCardKey(currentQuestionData.card));
    }
    recordVocabAnswer(currentQuestionData.card, isCorrect && !currentQuestionData.forceReview);
    markQuestionSettled();
    showAnswerDetails();
}

function handleTimeout() {
    if (activePracticeMode === 'grammar') {
        mistakes.add(currentQuestionData.example ? currentQuestionData.example.id : currentQuestionData.point.id);
        markQuestionSettled();
        let btns = document.querySelectorAll('.option-btn');
        btns.forEach((button, index) => {
            button.disabled = true;
            if (currentQuestionData.options[index] && currentQuestionData.options[index].isCorrect) {
                button.classList.add('correct');
            }
        });
        showGrammarAnswerDetails();
        return;
    }

    mistakes.add(getCardKey(currentQuestionData.card));
    recordVocabAnswer(currentQuestionData.card, false);
    markQuestionSettled();
    if (currentQuestionData.type !== 'manual') {
        let btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => {
            b.disabled = true;
            if (b.innerText === currentQuestionData.card.kana || b.innerText === currentQuestionData.card.zh) {
                b.classList.add('correct');
            }
        });
    } else {
        document.getElementById('manual-input').disabled = true;
        document.getElementById('btn-manual-submit').disabled = true;
    }
    showAnswerDetails();
}

function markUnfamiliar() {
    if (!currentQuestionData) return;
    const key = activePracticeMode === 'grammar'
        ? (currentQuestionData.example ? currentQuestionData.example.id : currentQuestionData.point.id)
        : getCardKey(currentQuestionData.card);
    if (activePracticeMode === 'vocab') currentQuestionData.forceReview = true;
    mistakes.add(key);
    let btn = document.getElementById('btn-unfamiliar');
    btn.innerText = "已記錄";
    btn.style.backgroundColor = "#b22222";
}

function updateUnfamiliarButtonState() {
    const btn = document.getElementById('btn-unfamiliar');
    if (!btn || !currentQuestionData) return;
    const key = activePracticeMode === 'grammar'
        ? (currentQuestionData.example ? currentQuestionData.example.id : currentQuestionData.point.id)
        : getCardKey(currentQuestionData.card);
    if (mistakes.has(key)) {
        btn.innerText = "已記錄";
        btn.style.backgroundColor = "#b22222";
    } else {
        btn.innerText = "我不熟";
        btn.style.backgroundColor = "var(--btn-bg)";
    }
}

function nextQuestion() {
    currentQIndex++;
    if (activePracticeMode === 'grammar') {
        renderGrammarQuestion();
    } else {
        renderQuestion();
    }
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// --- Result Screen ---
function endPractice() {
    if (activePracticeMode === 'grammar') {
        endGrammarPractice();
        return;
    }

    document.getElementById('practice-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-area').classList.add('fade');
    document.getElementById('btn-finish-now').classList.add('hidden');

    let total = getResultTotal();
    document.getElementById('score-display').innerText = formatScoreResult(total);
    document.getElementById('result-list-title').innerText = '重點錯誤/不熟題目 (勾選加入收藏)';

    const list = document.getElementById('result-list');
    list.innerHTML = '';

    if (total <= 0) {
        list.innerHTML = '<div style="text-align:center;">尚未完成任何題目。</div>';
        return;
    }

    if (mistakes.size === 0) {
        list.innerHTML = '<div style="text-align:center;">無錯誤項目，完美！</div>';
    } else {
        mistakes.forEach(id => {
            let card = db.find(c => getCardKey(c) === id);
            if(card) {
                let div = document.createElement('div');
                div.className = 'list-item';
                let isFav = isCardFavorite(card) ? 'checked' : '';
                div.innerHTML = `
                    <span>[${card.level} / ${formatCardMeta(card)}] ${card.kanji || card.kana} - ${card.zh}<br><span class="subtle-meta">${escapeHtml(formatVocabStats(card))}</span></span>
                    <input type="checkbox" class="result-fav-cb" value="${escapeHtml(getCardKey(card))}" ${isFav}>
                `;
                list.appendChild(div);
            }
        });
    }
}

function endGrammarPractice() {
    document.getElementById('practice-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('result-area').classList.add('fade');
    document.getElementById('btn-finish-now').classList.add('hidden');

    const total = getResultTotal();
    document.getElementById('score-display').innerText = formatScoreResult(total);
    document.getElementById('result-list-title').innerText = '錯誤文法整理 (勾選加入文法收藏)';

    const list = document.getElementById('result-list');
    list.innerHTML = '';

    if (total <= 0) {
        list.innerHTML = '<div style="text-align:center;">尚未完成任何題目。</div>';
        return;
    }

    if (mistakes.size === 0) {
        list.innerHTML = '<div style="text-align:center;">無錯誤項目，完美！</div>';
        return;
    }

    const mistakePointMap = new Map();
    practiceQueue.forEach(qData => {
        const key = qData.example ? qData.example.id : qData.point.id;
        if (!mistakes.has(key)) return;
        if (!mistakePointMap.has(qData.point.id)) {
            mistakePointMap.set(qData.point.id, { point: qData.point, examples: [] });
        }
        if (qData.example) mistakePointMap.get(qData.point.id).examples.push(qData.example);
    });

    mistakePointMap.forEach(({ point, examples }) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        const isFav = grammarFavIds.has(point.id) ? 'checked' : '';
        const example = examples[0];
        div.innerHTML = `
            <span>
                [${escapeHtml(point.category)}] ${escapeHtml(point.pattern)} - ${escapeHtml(point.zh)}
                ${example ? `<br><span style="color:#aaa;">${escapeHtml(example.sentence)}｜${escapeHtml(example.zh)}</span>` : ''}
            </span>
            <input type="checkbox" class="result-grammar-fav-cb" value="${escapeHtml(point.id)}" ${isFav}>
        `;
        list.appendChild(div);
    });
}

function saveResultFavoritesAndReturn() {
    if (activePracticeMode === 'grammar') {
        const checkboxes = document.querySelectorAll('.result-grammar-fav-cb');
        checkboxes.forEach(cb => {
            if (cb.checked) {
                grammarFavIds.add(cb.value);
            } else {
                grammarFavIds.delete(cb.value);
            }
        });
        saveGrammarFavs();
    } else {
        const checkboxes = document.querySelectorAll('.result-fav-cb');
        checkboxes.forEach(cb => {
            if (cb.checked) {
                favIds.add(cb.value);
            } else {
                favIds.delete(cb.value);
            }
        });
        saveFavs();
    }

    // Reset Header Buttons
    document.getElementById('btn-open-fav').classList.remove('hidden');
    document.getElementById('btn-unfamiliar').classList.add('hidden');
    document.getElementById('btn-finish-now').classList.add('hidden');
    updateFavoriteButtonLabel();

    document.getElementById('result-area').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
    document.getElementById('main-menu').classList.add('fade');
}

// --- Utilities ---
function csvCell(value) {
    const text = String(value || '');
    return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
}

function escapeHtml(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Start
init();

const startGrammarButton = document.getElementById('btn-start-grammar');
if (startGrammarButton) {
    startGrammarButton.addEventListener('click', event => {
        event.preventDefault();
        startGrammarPractice().catch(error => {
            console.error('Grammar practice failed to start', error);
            alert(`文法練習啟動失敗：${error.message || error}`);
        });
    });
}

// Enter key support for manual input
document.getElementById('manual-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter' && !this.disabled) checkManualAnswer();
});
document.getElementById('edit-category').addEventListener('change', updateEditPosState);

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
        });

        navigator.serviceWorker.register(`service-worker.js?v=${encodeURIComponent(APP_VERSION)}`)
            .then(registration => {
                registration.addEventListener('updatefound', () => {
                    const worker = registration.installing;
                    if (!worker) return;
                    worker.addEventListener('statechange', () => {
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                            worker.postMessage({ type: 'SKIP_WAITING' });
                        }
                    });
                });
                registration.update();
                if (registration.waiting) {
                    registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
            })
            .catch(error => {
                console.warn('Service worker registration failed', error);
            });
    });
}
